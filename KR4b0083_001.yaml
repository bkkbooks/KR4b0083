body:
  text: 卷一中宮二首殷湯令妃有莘之女仁教內修度義以處清謐後宮九嬪有序尹為媵臣遂作元輔類聚十五作成公綏詩詩紀二十一天地不獨立造化由陰陽乾坤垂覆載日月曜重光治國先家道立教起閨房二妃濟有虞三母隆周王塗山興大禹有莘佐成湯齊晉霸諸侯皆賴姬與薑關雎思賢妃此言安可忘初學記十類聚十五作成公綏詩詩紀二十一又鳴沙石室古籍叢殘類書殘卷萬花谷後八並無題無題無題洋洋熊耳流巍巍伊闕山高岡碣崔嵬雙阜夾長川素石何磷磷水禽何翩翩遠涉許潁路顧思邈綿綿鬱陶懷所親引領情緬然類聚二十七廣文選十詩紀二十一遊仙詩遊仙詩盛年無幾時奄忽行欲老那得赤松子從學度世道西入華陰山求得神芝草珠玉猶戴土何惜千金寶但願垂無窮與君長相保類聚七十八廣文選九詩紀二十一
