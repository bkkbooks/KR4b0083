body:
  text: 附録五言詩五言詩誰謂鬼無知杜伯射宣王水經注渭水注晉四廂樂歌王公上壽酒歌上壽酒樂未央大晉應天慶皇帝永無疆正旦大會行禮歌穆穆天子光臨萬國多士盈朝莫匪俊德流化罔極王猷允塞嘉會置酒嘉賓充庭羽旄曜辰極鐘鼓振泰清百辟朝三朝彧彧明儀刑濟濟鏘鏘金振玉聲禮樂具宴嘉賓眉壽祚聖皇景福惟日新群后戾止有來雍雍獻酬納贄崇此禮容豐肴萬俎旨酒千鍾嘉樂盡宴樂福祿咸攸同樂哉天下安寧道化行風俗清簫韶作詠九成年豐穰世泰平至治哉樂無窮元首聰明股肱忠澍豐澤揚清風嘉瑞出靈應彰麒麟見鳳皇翔醴泉湧流中唐嘉禾生穗盈箱降繁祉祚聖皇承天位統萬國受命應期授聖德四世重光宣開洪業景克昌文欽明德彌彰肇啓晉邦流祚無疆泰始建元鳳皇龍興龍興伊何享祚萬乘奄有八荒化育黎蒸圖書煥炳金石有徵德光大道熙隆被四表格皇穹奕奕萬嗣明明顯融高朗令終保茲永祚與天比崇聖皇君四海順人應天期三葉合重光泰始開洪基明曜參日月功化侔四時宇宙清且泰黎庶咸雍熙善哉雍熙惟天降命翼仁祐聖於穆三皇載德彌盛總齊瓊璣光統七政百揆時序化若神聖四海同風興至仁濟民育物擬陶鈞擬陶鈞垂惠潤皇皇群賢峨峨英雋德化宣芬芳播來胤播來胤垂後昆清廟何穆穆皇極闢四門皇極闢四門萬機無不綜亹亹翼翼樂不及荒飢不遑食大禮既行樂無極登崑崙上曾城乘飛龍升泰清冠日月佩五星揚虹霓建彗旌披慶雲蔭繁榮覽八極遊天庭順天地和陰陽序四時曜三光張帝網正皇綱播仁風流惠康邁洪化振靈威懷萬方納九夷朝閶闔宴紫微建五旗羅鐘虡列四縣奏韶武鏗金石揚旌羽縱八佾巴渝舞詠雅頌和律呂于胥樂樂聖主化蕩蕩清風泄總英雄御俊傑開宇宙掃四裔光緝熙美聖哲超百代揚休烈流景祚顯萬世皇皇顯祖翼世佐時寧濟六合受命應期神武鷹揚大化咸熙廓開皇衢用成帝基光光景皇無競惟烈匡時拯俗休功蓋世宇宙既康九域有截天命降鑒啓祚明哲穆穆烈考克明克雋實天生德誕膺靈運肇建帝業開國有晉載德奕世垂慶洪胤明明聖帝龍飛在天與靈合契通德幽玄仰化青雲俯育重淵受靈之祜於萬斯年藏鉤賦序藏鉤賦序余以臘之后因祭祀餘胙要命內外以行藏鉤
